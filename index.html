<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination Mini App</title>
    <script src="app.js" defer></script>
</head>
<body>
    <h1>Rick and Morty Cast of Characters</h1>
    <main>
        <section>
            <h2>Character Profile</h2>
            <div id="loadingMessage"></div>
            <button id="prev">Previous Page</button>
            <button id="next">Next Page</button>
            <div id="output">
                <p>ID: 1</p>
                <p>Name: Character</p>
                <img src="https://placehold.co/100" alt="Rick Sanchez">

            </div>
            <button id="prev">Previous Page</button>
            <button id="next">Next Page</button>
        </section>

    </main>

</body>
</html>
